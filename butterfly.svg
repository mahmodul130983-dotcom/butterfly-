<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

<defs>

<linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ffeb3b"/>
<stop offset="50%" stop-color="#ff9800"/>
<stop offset="100%" stop-color="#e91e63"/>
</linearGradient>

<radialGradient id="spot">
<stop offset="0%" stop-color="white"/>
<stop offset="100%" stop-color="#ffffff00"/>
</radialGradient>

</defs>

<!-- Left Upper Wing -->
<path d="M100 100
C35 10 5 70 45 120
C60 140 85 135 100 110Z"
fill="url(#wing)"
stroke="#222"
stroke-width="3"/>

<!-- Left Lower Wing -->
<path d="M100 105
C40 130 45 185 90 170
C100 165 105 145 100 115Z"
fill="url(#wing)"
stroke="#222"
stroke-width="3"/>

<!-- Right Upper Wing -->
<path d="M100 100
C165 10 195 70 155 120
C140 140 115 135 100 110Z"
fill="url(#wing)"
stroke="#222"
stroke-width="3"/>

<!-- Right Lower Wing -->
<path d="M100 105
C160 130 155 185 110 170
C100 165 95 145 100 115Z"
fill="url(#wing)"
stroke="#222"
stroke-width="3"/>

<!-- Wing Spots -->
<circle cx="60" cy="70" r="10" fill="url(#spot)"/>
<circle cx="140" cy="70" r="10" fill="url(#spot)"/>

<circle cx="70" cy="145" r="8" fill="url(#spot)"/>
<circle cx="130" cy="145" r="8" fill="url(#spot)"/>

<!-- Body -->
<ellipse cx="100" cy="105" rx="8" ry="45"
fill="#222"/>

<!-- Head -->
<circle cx="100" cy="55" r="8"
fill="#222"/>

<!-- Antenna -->
<path d="M95 50 Q80 20 75 15"
stroke="#222"
stroke-width="2"
fill="none"/>

<path d="M105 50 Q120 20 125 15"
stroke="#222"
stroke-width="2"
fill="none"/>

<circle cx="75" cy="15" r="2" fill="#222"/>
<circle cx="125" cy="15" r="2" fill="#222"/>

</svg>
