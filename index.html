<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Butterfly</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

    <div class="sun"></div>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <div class="grass"></div>

    <div class="flower flower1"></div>
    <div class="flower flower2"></div>
    <div class="flower flower3"></div>

    <div id="butterfly" class="butterfly">

        <div class="wing left">
            <img src="butterfly.svg" alt="Left Wing">
        </div>

        <div class="body"></div>

        <div class="wing right">
            <img src="butterfly.svg" alt="Right Wing">
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
